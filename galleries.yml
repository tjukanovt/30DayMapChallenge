# Community map galleries for the #30DayMapChallenge.
#
# Want your gallery listed on https://30daymapchallenge.com/galleries/ ?
# Copy one entry below, fill in the fields, and open a pull request.
# See CONTRIBUTING.md for other ways to submit.
#
# Fields:
#   creator     - your name, team or handle           (required)
#   link        - URL to the gallery / collection     (required)
#   year        - challenge year the gallery covers   (required)
#   description - one short sentence about it          (optional)

