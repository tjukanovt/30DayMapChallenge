name: build

# Staging check: build the site for every pull request so broken builds and
# content inconsistencies are caught before they reach the live site.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-mkdocs.txt

      # The theme table lives in includes/themes-2025.md (used by the site) and
      # is mirrored into README.md between the TABLE START/END markers (shown on
      # GitHub). Fail the build if the two copies drift apart.
      - name: Check theme table is in sync
        run: |
          awk '/<!-- TABLE START -->/{f=1;next} /<!-- TABLE END -->/{f=0} f' README.md \
            | grep -v '^[[:space:]]*$' | sed 's/[[:space:]]*$//' > /tmp/readme-table.md
          grep -v '^[[:space:]]*$' includes/themes-2025.md \
            | sed 's/[[:space:]]*$//' > /tmp/include-table.md
          if ! diff -u /tmp/include-table.md /tmp/readme-table.md; then
            echo "::error::README.md theme table is out of sync with includes/themes-2025.md"
            exit 1
          fi

      - name: Build site (strict)
        run: mkdocs build --strict

      # Download from the workflow run's "Artifacts" section to preview the
      # built site for a pull request.
      - name: Upload site preview
        uses: actions/upload-artifact@v4
        with:
          name: site-preview
          path: site/
