name: build

# Staging check: build the site for every pull request so broken builds and
# content inconsistencies are caught before they reach the live site.
on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-mkdocs.txt

      - name: Build site (strict)
        run: mkdocs build --strict

      # Download from the workflow run's "Artifacts" section to preview the
      # built site for a pull request.
      - name: Upload site preview
        uses: actions/upload-artifact@v4
        with:
          name: site-preview
          path: site/
